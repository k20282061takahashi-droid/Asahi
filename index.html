<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学祭リアルタイム待ち時間</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            margin-top: 100px;
            background-color: #f0f2f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            min-width: 250px;
        }
        .time {
            font-size: 48px;
            color: #ff6b6b;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="class-name">読み込み中...</h1>
        <p>現在の待ち時間</p>
        <div class="time"><span id="wait-time">--</span> 分</div>
        <p id="status-text">混雑状況：--</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ⚠️ ここをご自身のfirebaseConfigに書き換えてね！
        const firebaseConfig = {
            apiKey: "AIzaSyCC170nG-zS3w72fzCLr8XAFa1xiBl-OV8",
            authDomain: "uzushiosai.firebaseapp.com",
            projectId: "uzushiosai",
            storageBucket: "uzushiosai.firebasestorage.app",
            messagingSenderId: "351063552443",
            appId: "1:351063552443:web:347362d913232acd47149e",
             measurementId: "G-MVR7LLLX3E"
        };

        // Firebaseの初期化
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Firestoreの「classesコレクションの1Aドキュメント」をリアルタイム監視
        const docRef = doc(db, "classes", "1A");

        onSnapshot(docRef, (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                // 画面の文字をデータベースの値に書き換える
                document.getElementById("class-name").innerText = data.name;
                document.getElementById("wait-time").innerText = data.waitTime;
                document.getElementById("status-text").innerText = "混雑状況：" + data.status;
            } else {
                console.log("データが見つかりません！");
            }
        });
    </script>
</body>
</html>
